<div class="dashboard-wrapper">
    <h2 class="section-title">Resumen de Inventario</h2>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon icon-blue">
          <i class="fas fa-dollar-sign"></i> </div>
        <div class="stat-info">
          <span class="stat-label">Valor Total Inventario</span>
          <div class="stat-value">{{ stats.totalValor | currency:'EUR' }}</div>
        </div>
      </div>
  
      <div class="stat-card">
        <div class="stat-icon icon-green">
          <i class="fas fa-boxes"></i>
        </div>
        <div class="stat-info">
          <span class="stat-label">Stock Total</span>
          <div class="stat-value">{{ stats.totalUnidades }} uds</div>
        </div>
      </div>
  
      <div class="stat-card">
        <div class="stat-icon icon-red">
          <i class="fas fa-exclamation-triangle"></i>
        </div>
        <div class="stat-info">
          <span class="stat-label">Alertas de Stock</span>
          <div class="stat-value">{{ stats.alertaStock }}</div>
        </div>
      </div>
    </div>
  </div>
